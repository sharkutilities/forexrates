name: Update FOREX Data in MacroDB Schema

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *"

jobs:
  build:
    name: Update FOREX Data
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write

    steps:
      - name: Checkout Repository Content with @actions/v6
        uses: actions/checkout@v6

      - name: Setup Python with @actions/v6
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install Python & Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install ForexRates Package
        run: pip install -e .

      - name: Install External Dependencies
        run: |
          git clone https://gist.github.com/ZenithClown/d2dd294c5f528459e16b139c04c0b182.git dtutils

      - name: Execute ERAPI Python Script
        env:
          AIVENIO_MACRODB_DATABASE: ${{ secrets.AIVENIO_MACRODB_DATABASE }}
          AIVENIO_MACRODB_HOSTNAME: ${{ secrets.AIVENIO_MACRODB_HOSTNAME }}
          AIVENIO_MACRODB_PASSWORD: ${{ secrets.AIVENIO_MACRODB_PASSWORD }}
          AIVENIO_MACRODB_PORTNAME: ${{ secrets.AIVENIO_MACRODB_PORTNAME }}
          AIVENIO_MACRODB_USERNAME: ${{ secrets.AIVENIO_MACRODB_USERNAME }}
          EXCHANGERATES_IO_API_KEY: ${{ secrets.EXCHANGERATES_IO_API_KEY }}
        run: |
          python main/erapi.py || {
            echo "❌ ERAPI script failed"
            exit 1
          }

      - name: Commit and Push Logs
        run: |
          git config --local user.name "GitHub Actions Bot"
          git config --local user.email "actions@github.com"
          
          if [ -f status.log ]; then
            git add status.log
            git commit -m "📝 ERAPI Logs Updated [$(date '+%Y-%m-%d %H:%M:%S')]" || echo "No changes to commit"
            git push || echo "Nothing to push"
          else
            echo "⚠️ Warning: status.log not found"
          fi
