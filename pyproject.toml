[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "forexrates"
version = "0.0.1.dev0"
description = "A unified codebase for fetching Foreign Exchange Rates from different API sources"
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
authors = [
    {name = "sharkutilities"}
]
keywords = ["forex", "foreign-exchange", "currency-rates", "api", "exchange-rates"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Financial and Insurance Industry",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Topic :: Office/Business :: Financial",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

dependencies = [
    "numpy==1.24.4",
    "pandas==1.5.3",
    "psycopg2==2.9.10",
    "SQLAlchemy==1.4.54",
]

[project.urls]
Homepage = "https://github.com/sharkutilities/forexrates"
Repository = "https://github.com/sharkutilities/forexrates"
Issues = "https://github.com/sharkutilities/forexrates/issues"

[tool.setuptools]
packages = ["forexrates", "forexrates.api", "forexrates.io"]

[tool.setuptools.package-data]
forexrates = ["py.typed"]
